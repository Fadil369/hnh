      {ar:'د. محمد محمد مجدي',en:'Dr. Mohamed M.',specAr:'الطب العام',specEn:'General Medicine',branchAr:'المدينة',branchEn:'Madinah',years:8,langs:'العربية'},
      {ar:'د. محمد مؤنس محمد',en:'Dr. Mohamed Mounes',specAr:'الأعصاب',specEn:'Neurology',branchAr:'الرياض',branchEn:'Riyadh',years:16,langs:'العربية'}
    ];

    let visibleCount = 32;
    let filteredDoctors = [...allDoctors];

    function renderDoctors() {
      const grid = document.getElementById('doctorsGrid');
      const l = HNH.currentLang();
      const toShow = filteredDoctors.slice(0, visibleCount);
      grid.innerHTML = toShow.map((d, i) => `
        <div class="card doctor-card animate-on-scroll delay-${(i%4)+1}">
          <div class="doctor-photo">${(l==='ar'?d.ar:d.en).split(' ').pop().charAt(0)}</div>
          <h4>${l==='ar'?d.ar:d.en}</h4>
          <div class="specialty">${l==='ar'?d.specAr:d.specEn}</div>
          <div class="branch-tag">${l==='ar'?d.branchAr:d.branchEn}</div>
          <a href="contact.html" class="btn btn-primary btn-sm">${l==='ar'?'احجز الآن':'Book Now'}</a>
        </div>
      `).join('');
      document.getElementById('loadMoreBtn').style.display = visibleCount >= filteredDoctors.length ? 'none' : '';
      setTimeout(() => {
        document.querySelectorAll('.animate-on-scroll:not(.animated)').forEach(el => {
          new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('animated'); });
          }, {threshold:0.1}).observe(el);
        });
      }, 50);
    }

    function filterDoctors() {
      const search = document.getElementById('doctorSearch').value.toLowerCase();
      const dept = document.getElementById('deptFilter').value;
      const branch = document.getElementById('branchFilter').value;
      const l = HNH.currentLang();
      filteredDoctors = allDoctors.filter(d => {
        const name = (l==='ar'?d.ar:d.en).toLowerCase();
        const spec = (l==='ar'?d.specAr:d.specEn);
        const br = (l==='ar'?d.branchAr:d.branchEn);
        return (!search || name.includes(search)) &&
               (!dept || spec.includes(dept)) &&
               (!branch || br.includes(branch));
      });
      visibleCount = 32;
      loadDoctors();
  async function loadDoctors() {
    try {
      const res = await fetch(API_URL + '/api/providers');
      const data = await res.json();
      if (data.providers && data.providers.length > 0) {
        allDoctors = data.providers.map(p => ({
          ar: p.name_ar || '',
          en: p.name_en || '',
          specAr: p.specialty || p.department || 'الطب العام',
          specEn: p.department || 'General Medicine',
          branchAr: p.branch || 'الرياض',
          branchEn: p.branch_id || 'Riyadh',
          years: p.experience_years || 10,
          langs: 'العربية'
        })).filter(d => d.ar);
      }
    } catch(e) {}
    if (allDoctors.length === 0) allDoctors = staticDoctors;
    visibleCount = 32;
    renderDoctors();
    filterDoctors();
  }

  renderDoctors();
    }

    function loadMoreDoctors() {
      visibleCount += 24;
      renderDoctors();
    }

    renderDoctors();

    function updateDoctorsContent() {
      const l = HNH.currentLang();
      document.getElementById('doctorsPageSub').textContent = l==='ar'?'فريق من أمهر الأطباء والاستشاريين — أكثر من 700 طبيب':'A team of skilled doctors and consultants — 700+ doctors';
      document.getElementById('doctorSearch').placeholder = l==='ar'?'ابحث عن طبيب...':'Search doctors...';
      renderDoctors();
    }
    const origToggle4 = HNH.toggleLanguage;
    HNH.toggleLanguage = function() { origToggle4(); setTimeout(updateDoctorsContent, 50); };
  </script>
</body>
