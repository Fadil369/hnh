<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مستشفيات الحياة الوطني | Hayat National Hospitals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    /* ═══════════════════════════════════════════
       HNH LUXURY DESIGN SYSTEM
       Premium Healthcare — Dark Gold Edition
    ═══════════════════════════════════════════ */
    :root {
      --ink:       #0E1520;
      --ink-soft:  #1A2540;
      --ink-mid:   #253353;
      --gold:      #C9A84C;
      --gold-lt:   #E8CC78;
      --gold-dk:   #9A7A30;
      --cream:     #FAF7F2;
      --cream-dk:  #F0EBE0;
      --azure:     #1A7FD4;
      --azure-lt:  #3498DB;
      --white:     #FFFFFF;
      --text:      #1E2D45;
      --text-soft: #4A5C74;
      --text-muted:#8096B0;
      --border:    rgba(201,168,76,0.18);
      --border-lt: rgba(201,168,76,0.08);

      --grad-ink:  linear-gradient(135deg, #0E1520 0%, #1A2B4A 60%, #0F2040 100%);
      --grad-gold: linear-gradient(135deg, #9A7A30 0%, #C9A84C 50%, #E8CC78 100%);
      --grad-hero: linear-gradient(145deg, #070E1A 0%, #0E1D35 40%, #111B32 100%);
      --grad-azure:linear-gradient(135deg, #0F5FA8 0%, #1A7FD4 100%);

      --sh-gold:  0 8px 40px rgba(201,168,76,0.25);
      --sh-card:  0 4px 32px rgba(0,0,0,0.18);
      --sh-hover: 0 16px 56px rgba(0,0,0,0.28);
      --sh-deep:  0 24px 80px rgba(0,0,0,0.35);

      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 32px;
      --r-pill: 9999px;

      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
      --dur: 0.3s;
      --dur-slow: 0.5s;

      --font-ar: 'Tajawal', sans-serif;
      --font-en: 'Inter', sans-serif;
      --font-display: 'Playfair Display', serif;
      --container: 1320px;
      --nav-h: 80px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-ar);
      background: var(--cream);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    [dir="ltr"] body { font-family: var(--font-en); }

    a { text-decoration: none; color: inherit; transition: color var(--dur) var(--ease); }
    ul { list-style: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    img { max-width: 100%; display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--ink); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dk); border-radius: 3px; }

    /* ── CONTAINER ── */
    .container { max-width: var(--container); margin: 0 auto; padding: 0 28px; }

    /* ── TYPOGRAPHY ── */
    h1 { font-size: clamp(2.4rem, 5.5vw, 5rem); line-height: 1.1; }
    h2 { font-size: clamp(1.8rem, 3.5vw, 3rem); line-height: 1.2; }
    h3 { font-size: clamp(1.2rem, 2vw, 1.6rem); }
    h4 { font-size: 1.1rem; }

    .display-serif { font-family: var(--font-display); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 36px; border-radius: var(--r-pill);
      font-weight: 600; font-size: 0.95rem; transition: all var(--dur) var(--ease);
      white-space: nowrap; position: relative; overflow: hidden;
    }
    .btn-gold {
      background: var(--grad-gold); color: var(--ink);
      box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: var(--sh-gold); }

    .btn-outline-gold {
      border: 1.5px solid var(--gold); color: var(--gold); background: transparent;
    }
    .btn-outline-gold:hover { background: var(--gold); color: var(--ink); }

    .btn-ink {
      background: var(--ink-soft); color: var(--white);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .btn-ink:hover { transform: translateY(-2px); background: var(--ink-mid); }

    .btn-ghost { color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.2); }
    .btn-ghost:hover { color: white; border-color: var(--gold); background: rgba(201,168,76,0.08); }

    .btn-portal {
      color: var(--gold);
      background: linear-gradient(180deg, rgba(201,168,76,0.10), rgba(201,168,76,0.04));
      border: 1px solid rgba(201,168,76,0.45);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.05) inset;
      letter-spacing: 0.6px;
    }
    .btn-portal:hover {
      color: var(--ink);
      background: linear-gradient(180deg, var(--gold), var(--gold-dk));
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: var(--sh-gold);
    }

    .btn-sm { padding: 10px 24px; font-size: 0.88rem; }
    .btn-lg { padding: 18px 48px; font-size: 1.05rem; }

    /* ── GOLD LINE DIVIDER ── */
    .gold-rule {
      width: 48px; height: 3px;
      background: var(--grad-gold);
      border-radius: 2px; margin-bottom: 20px;
    }
    .gold-rule.center { margin-left: auto; margin-right: auto; }
    [dir="rtl"] .gold-rule { margin-right: 0; }
    [dir="ltr"] .gold-rule { margin-left: 0; }

    /* ══════════════════════════════════
       NAVIGATION
    ══════════════════════════════════ */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: var(--nav-h);
      transition: all var(--dur-slow) var(--ease);
    }
    .nav-inner {
      height: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      transition: all var(--dur-slow) var(--ease);
    }
    .nav.scrolled .nav-inner {
      background: rgba(10,15,28,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav:not(.scrolled) .nav-inner { background: transparent; }

    .nav-logo { display: flex; align-items: center; gap: 14px; }
    .nav-logo-mark {
      width: 46px; height: 46px;
      background: var(--grad-gold);
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-mark svg { width: 24px; height: 24px; fill: var(--ink); }
    .nav-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
    .nav-logo-text .ar { font-size: 1rem; font-weight: 700; color: white; }
    .nav-logo-text .en { font-size: 0.72rem; color: var(--gold); font-weight: 500; letter-spacing: 0.04em; }

    .nav-links { display: flex; align-items: center; gap: 2px; }
    .nav-links a {
      padding: 8px 14px; border-radius: var(--r-pill);
      color: rgba(255,255,255,0.72); font-size: 0.88rem; font-weight: 500;
      transition: all var(--dur) var(--ease);
    }
    .nav-links a:hover, .nav-links a.active { color: white; background: rgba(255,255,255,0.08); }

    .nav-actions { display: flex; align-items: center; gap: 10px; }

    .lang-btn {
      padding: 7px 16px; border-radius: var(--r-pill);
      border: 1.5px solid rgba(201,168,76,0.45);
      color: var(--gold); font-size: 0.8rem; font-weight: 700;
      transition: all var(--dur) var(--ease); background: transparent;
    }
    .lang-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

    .nav-book {
      background: var(--grad-gold); color: var(--ink);
      padding: 10px 22px; border-radius: var(--r-pill);
      font-size: 0.88rem; font-weight: 700;
      box-shadow: 0 3px 14px rgba(201,168,76,0.3);
      transition: all var(--dur) var(--ease);
    }
    .nav-book:hover { transform: translateY(-1px); box-shadow: var(--sh-gold); }

    .nav-portal {
      color: var(--gold);
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.4);
      padding: 9px 18px; border-radius: var(--r-pill);
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.5px;
      transition: all var(--dur) var(--ease);
      text-decoration: none;
    }
    .nav-portal:hover {
      color: var(--ink); background: var(--grad-gold);
      border-color: var(--gold); transform: translateY(-1px);
      box-shadow: 0 3px 14px rgba(201,168,76,0.3);
    }
    @media (max-width: 720px) {
      .nav-portal { display: none; }
    }

    /* ══════════════════════════════════
       HERO
    ══════════════════════════════════ */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center;
      overflow: hidden;
      background: var(--grad-hero);
    }

    .hero-canvas {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 80px 80px;
    }
    .hero-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .hero-glow-1 {
      width: 600px; height: 600px;
      top: -200px; right: -100px;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    }
    .hero-glow-2 {
      width: 400px; height: 400px;
      bottom: -100px; left: 5%;
      background: radial-gradient(circle, rgba(26,127,212,0.1) 0%, transparent 70%);
    }

    .hero-content {
      position: relative; z-index: 2;
      padding-top: var(--nav-h);
      max-width: 760px;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 8px 18px; border-radius: var(--r-pill);
      border: 1px solid var(--border);
      background: rgba(201,168,76,0.06);
      color: var(--gold); font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 28px;
    }
    .hero-eyebrow-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.6); }
    }

    .hero h1 { color: white; margin-bottom: 24px; font-weight: 800; }
    .hero h1 .accent { color: var(--gold); }
    .hero h1 em { font-style: normal; font-family: var(--font-display); font-style: italic; }

    .hero-sub {
      color: rgba(255,255,255,0.65); font-size: 1.15rem;
      max-width: 540px; line-height: 1.85; margin-bottom: 44px;
    }
    .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 64px; }

    .hero-stats-row {
      display: flex; gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      max-width: 580px;
    }
    .hero-stat-item {
      flex: 1; padding: 24px 20px; text-align: center;
      border-left: 1px solid var(--border);
      transition: background var(--dur) var(--ease);
    }
    .hero-stat-item:first-child { border-left: none; }
    [dir="ltr"] .hero-stat-item { border-left: none; border-right: 1px solid var(--border); }
    [dir="ltr"] .hero-stat-item:first-child { border-right: none; }
    .hero-stat-item:hover { background: rgba(201,168,76,0.06); }
    .hero-stat-num {
      font-size: 1.9rem; font-weight: 800; color: var(--gold-lt);
      display: block; line-height: 1;
    }
    .hero-stat-lbl {
      font-size: 0.78rem; color: rgba(255,255,255,0.5);
      margin-top: 5px; font-weight: 500;
    }

    /* Hero right panel — visual */
    .hero-visual {
      position: absolute;
      top: 0; right: 0;
      width: 48%; height: 100%;
      z-index: 1;
    }
    [dir="ltr"] .hero-visual { right: auto; left: 0; }

    .hero-visual-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(26,127,212,0.08) 0%, rgba(201,168,76,0.05) 100%);
    }
    .hero-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-card-float {
      position: absolute; background: rgba(10,18,32,0.88);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 18px 22px;
      box-shadow: var(--sh-card);
    }
    .hero-card-1 { bottom: 18%; left: 8%; animation: float-card 6s ease-in-out infinite; }
    .hero-card-2 { top: 22%; right: 6%; animation: float-card 8s ease-in-out infinite 2s; }
    @keyframes float-card {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .float-card-label { font-size: 0.7rem; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .float-card-val { font-size: 1.4rem; font-weight: 800; color: white; }
    .float-card-sub { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 2px; }

    /* Decorative hospital silhouette */
    .hero-silhouette {
      position: absolute; bottom: 0; right: 0; left: 0;
      height: 70%;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0.06;
    }

    /* ══════════════════════════════════
       STATS BAR
    ══════════════════════════════════ */
    .stats-bar-section {
      background: var(--ink);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .stats-bar-inner {
      display: grid; grid-template-columns: repeat(4, 1fr);
    }
    .stat-bar-item {
      padding: 40px 32px; text-align: center;
      border-left: 1px solid var(--border);
      position: relative;
      transition: background var(--dur) var(--ease);
    }
    .stat-bar-item:first-child { border-left: none; }
    [dir="ltr"] .stat-bar-item { border-left: none; border-right: 1px solid var(--border); }
    [dir="ltr"] .stat-bar-item:first-child { border-right: none; }
    .stat-bar-item:hover { background: rgba(201,168,76,0.04); }
    .stat-bar-num {
      font-size: 2.8rem; font-weight: 900; color: var(--gold);
      display: block; line-height: 1; letter-spacing: -0.02em;
    }
    .stat-bar-lbl {
      font-size: 0.88rem; color: rgba(255,255,255,0.45);
      margin-top: 8px; font-weight: 500;
    }

    /* ══════════════════════════════════
       ABOUT
    ══════════════════════════════════ */
    .about-section {
      background: var(--cream); padding: 120px 0;
    }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: center;
    }
    .about-visual {
      position: relative;
    }
    .about-img-main {
      width: 100%; aspect-ratio: 4/5;
      border-radius: var(--r-xl);
      background: var(--grad-ink);
      overflow: hidden; position: relative;
      box-shadow: var(--sh-deep);
    }
    .about-img-badge {
      position: absolute;
      background: var(--grad-gold);
      border-radius: var(--r-lg);
      padding: 20px 24px;
      box-shadow: var(--sh-gold);
    }
    .about-img-badge.badge-1 { bottom: -20px; right: -20px; [dir="ltr"] &{ right: auto; left: -20px; } }
    .badge-num { font-size: 2.2rem; font-weight: 900; color: var(--ink); line-height: 1; }
    .badge-txt { font-size: 0.8rem; color: var(--ink-soft); font-weight: 600; margin-top: 3px; }

    .about-content { padding: 20px 0; }
    .about-content h2 { color: var(--ink); margin-bottom: 20px; font-weight: 800; }
    .about-content p { color: var(--text-soft); line-height: 1.9; margin-bottom: 18px; font-size: 1.02rem; }
    .about-features {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 36px 0 40px;
    }
    .about-feat {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px; border-radius: var(--r-md);
      border: 1px solid var(--cream-dk);
      background: white;
      transition: all var(--dur) var(--ease);
    }
    .about-feat:hover { border-color: var(--gold); box-shadow: 0 4px 20px rgba(201,168,76,0.1); }
    .about-feat-icon {
      width: 38px; height: 38px; border-radius: var(--r-sm);
      background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.06));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .about-feat-icon svg { width: 18px; height: 18px; fill: var(--gold); }
    .about-feat-label { font-size: 0.9rem; font-weight: 600; color: var(--ink); }
    .about-feat-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* ══════════════════════════════════
       DEPARTMENTS
    ══════════════════════════════════ */
    .dept-section { background: var(--ink); padding: 120px 0; }
    .section-header { text-align: center; margin-bottom: 64px; }
    .section-header h2 { color: white; }
    .section-header p { color: rgba(255,255,255,0.45); font-size: 1.05rem; margin-top: 14px; }
    .section-header.light h2 { color: var(--ink); }
    .section-header.light p { color: var(--text-soft); }

    .dept-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
    }
    .dept-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 32px 24px; text-align: center;
      cursor: pointer;
      transition: all var(--dur-slow) var(--ease);
      position: relative; overflow: hidden;
    }
    .dept-card::before {
      content: ''; position: absolute;
      inset: 0; border-radius: var(--r-lg);
      background: var(--grad-gold);
      opacity: 0; transition: opacity var(--dur) var(--ease);
    }
    .dept-card:hover { transform: translateY(-6px); border-color: var(--gold); box-shadow: var(--sh-gold); }
    .dept-card:hover::before { opacity: 0.05; }
    .dept-card-inner { position: relative; z-index: 1; }
    .dept-icon {
      width: 68px; height: 68px; border-radius: var(--r-lg);
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      transition: all var(--dur) var(--ease);
    }
    .dept-card:hover .dept-icon {
      background: var(--grad-gold);
      border-color: transparent;
    }
    .dept-icon svg { width: 30px; height: 30px; fill: var(--gold); transition: fill var(--dur) var(--ease); }
    .dept-card:hover .dept-icon svg { fill: var(--ink); }
    .dept-name { font-size: 1rem; font-weight: 700; color: white; margin-bottom: 8px; }
    .dept-desc { font-size: 0.82rem; color: rgba(255,255,255,0.38); line-height: 1.6; }

    /* ══════════════════════════════════
       DOCTORS
    ══════════════════════════════════ */
    .doctors-section { background: var(--cream); padding: 120px 0; }

    .filter-bar {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; margin-bottom: 48px;
      padding: 20px 24px;
      background: white; border-radius: var(--r-lg);
      border: 1px solid var(--cream-dk);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .filter-bar input, .filter-bar select {
      flex: 1; min-width: 160px;
      padding: 11px 16px; border-radius: var(--r-pill);
      border: 1.5px solid var(--cream-dk);
      font-family: inherit; font-size: 0.9rem; color: var(--text);
      background: var(--cream); outline: none;
      transition: border-color var(--dur) var(--ease);
    }
    .filter-bar input:focus, .filter-bar select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }

    .doctors-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }

    .doctor-card {
      background: white; border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid var(--cream-dk);
      box-shadow: 0 2px 16px rgba(0,0,0,0.05);
      transition: all var(--dur-slow) var(--ease);
    }
    .doctor-card:hover { transform: translateY(-6px); box-shadow: var(--sh-card); border-color: var(--gold); }

    .doctor-card-top {
      height: 160px; position: relative;
      background: var(--grad-ink);
      display: flex; align-items: center; justify-content: center;
    }
    .doctor-card-top::after {
      content: ''; position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, transparent 60%);
    }
    .doctor-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--grad-gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 800; color: var(--ink);
      border: 3px solid rgba(255,255,255,0.15);
      position: relative; z-index: 1;
    }
    .doctor-specialty-badge {
      position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
      background: var(--grad-gold); color: var(--ink);
      padding: 5px 16px; border-radius: var(--r-pill);
      font-size: 0.75rem; font-weight: 700; white-space: nowrap;
      z-index: 2;
    }
    .doctor-card-body { padding: 28px 20px 22px; text-align: center; }
    .doctor-name { font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
    .doctor-branch {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.78rem; color: var(--text-muted);
      margin-bottom: 16px;
    }
    .doctor-branch svg { width: 12px; height: 12px; fill: var(--text-muted); }
    .doctor-years {
      font-size: 0.78rem; color: var(--text-soft);
      margin-bottom: 16px;
    }
    .doctor-book-btn {
      width: 100%; padding: 11px; border-radius: var(--r-pill);
      background: var(--grad-ink); color: white;
      font-size: 0.88rem; font-weight: 600;
      transition: all var(--dur) var(--ease);
    }
    .doctor-book-btn:hover { background: var(--grad-gold); color: var(--ink); }

    .load-more-wrap { text-align: center; margin-top: 48px; }

    /* ══════════════════════════════════
       BRANCHES
    ══════════════════════════════════ */
    .branches-section { background: var(--ink-soft); padding: 120px 0; }
    .branches-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

    .branch-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden;
      transition: all var(--dur-slow) var(--ease);
    }
    .branch-card:hover { transform: translateY(-4px); border-color: var(--gold); box-shadow: var(--sh-gold); }
    .branch-card-top {
      height: 10px;
      background: var(--grad-gold);
    }
    .branch-card-body { padding: 32px 28px; }
    .branch-icon-wrap {
      width: 52px; height: 52px; border-radius: var(--r-md);
      background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    .branch-icon-wrap svg { width: 24px; height: 24px; fill: var(--gold); }
    .branch-name { font-size: 1.15rem; font-weight: 700; color: white; margin-bottom: 6px; }
    .branch-name-full { font-size: 0.82rem; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .branch-detail {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.85rem; color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
      transition: color var(--dur) var(--ease);
    }
    .branch-detail:hover { color: var(--gold); }
    .branch-detail svg { width: 16px; height: 16px; fill: var(--gold); flex-shrink: 0; margin-top: 2px; }
    .branch-card-footer {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }
    .branch-btn {
      flex: 1; padding: 10px; border-radius: var(--r-pill);
      font-size: 0.82rem; font-weight: 600;
      text-align: center;
      border: 1px solid var(--border); color: rgba(255,255,255,0.5);
      transition: all var(--dur) var(--ease);
    }
    .branch-btn:hover { border-color: var(--gold); color: var(--gold); }
    .branch-btn.primary { background: var(--grad-gold); color: var(--ink); border-color: transparent; }
    .branch-btn.primary:hover { box-shadow: var(--sh-gold); }

    /* ══════════════════════════════════
       TESTIMONIALS
    ══════════════════════════════════ */
    .testimonials-section { background: var(--cream); padding: 120px 0; overflow: hidden; }

    .testimonial-track-wrap { overflow: hidden; position: relative; }
    .testimonial-track {
      display: flex; transition: transform 0.6s var(--ease-out);
    }
    .testimonial-slide {
      min-width: 100%; padding: 0 10%;
      text-align: center;
    }
    .testimonial-quote-mark {
      font-family: var(--font-display);
      font-size: 8rem; line-height: 0.5;
      color: var(--gold); opacity: 0.25;
      margin-bottom: 24px; display: block;
    }
    .testimonial-text {
      font-size: 1.3rem; line-height: 1.85;
      color: var(--ink); font-style: italic;
      font-family: var(--font-display);
      max-width: 720px; margin: 0 auto 32px;
    }
    .testimonial-author { font-weight: 700; color: var(--ink); font-size: 1rem; }
    .testimonial-role { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .testimonial-stars {
      display: flex; justify-content: center; gap: 4px;
      margin-bottom: 28px;
    }
    .testimonial-stars svg { width: 18px; height: 18px; fill: var(--gold); }

    .testimonial-nav {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-top: 40px;
    }
    .t-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--cream-dk); cursor: pointer;
      transition: all var(--dur) var(--ease);
    }
    .t-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }
    .t-arrow {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid var(--cream-dk);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all var(--dur) var(--ease);
      color: var(--text-soft);
    }
    .t-arrow:hover { border-color: var(--gold); color: var(--gold); }
    .t-arrow svg { width: 18px; height: 18px; fill: currentColor; }

    /* ══════════════════════════════════
       CTA
    ══════════════════════════════════ */
    .cta-section {
      background: var(--ink);
      padding: 100px 0;
      position: relative; overflow: hidden;
    }
    .cta-glow {
      position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none;
    }
    .cta-glow-1 { width: 500px; height: 500px; top: -200px; right: 5%; background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%); }
    .cta-glow-2 { width: 400px; height: 400px; bottom: -150px; left: 5%; background: radial-gradient(circle, rgba(26,127,212,0.1) 0%, transparent 70%); }
    .cta-inner { position: relative; z-index: 1; text-align: center; }
    .cta-inner h2 { color: white; font-weight: 800; margin-bottom: 16px; }
    .cta-inner p { color: rgba(255,255,255,0.5); font-size: 1.1rem; margin-bottom: 40px; max-width: 500px; margin-left: auto; margin-right: auto; }
    .cta-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    /* ══════════════════════════════════
       FOOTER
    ══════════════════════════════════ */
    .footer { background: #070E1A; padding: 80px 0 0; }
    .footer-grid {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 60px; margin-bottom: 60px;
    }
    .footer-brand-desc { color: rgba(255,255,255,0.35); font-size: 0.9rem; line-height: 1.8; margin-top: 18px; }
    .footer-socials { display: flex; gap: 10px; margin-top: 24px; }
    .footer-social-link {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.35); transition: all var(--dur) var(--ease);
    }
    .footer-social-link:hover { border-color: var(--gold); color: var(--gold); }
    .footer-social-link svg { width: 16px; height: 16px; fill: currentColor; }

    .footer-col-title {
      font-size: 0.82rem; font-weight: 700; color: white;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 22px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .footer-links { display: flex; flex-direction: column; gap: 10px; }
    .footer-links a {
      color: rgba(255,255,255,0.38); font-size: 0.88rem;
      transition: color var(--dur) var(--ease);
      display: flex; align-items: center; gap: 6px;
    }
    .footer-links a:hover { color: var(--gold); }

    .footer-bottom {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; color: rgba(255,255,255,0.25);
    }

    /* ══════════════════════════════════
       BOOKING MODAL
    ══════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(5,10,20,0.85);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: all var(--dur-slow) var(--ease);
      padding: 20px;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: white; border-radius: var(--r-xl);
      width: 100%; max-width: 620px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: var(--sh-deep);
      transform: translateY(30px) scale(0.97);
      transition: transform var(--dur-slow) var(--ease);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-header {
      background: var(--grad-ink);
      padding: 32px 36px 28px;
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      position: relative;
    }
    .modal-header h3 { color: white; font-size: 1.3rem; font-weight: 700; }
    .modal-header p { color: rgba(255,255,255,0.45); font-size: 0.9rem; margin-top: 6px; }
    .modal-close {
      position: absolute; top: 20px; left: 20px;
      [dir="ltr"] &{ left: auto; right: 20px; }
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.5); transition: all var(--dur) var(--ease);
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); color: white; }
    .modal-close svg { width: 18px; height: 18px; fill: currentColor; }

    /* Step progress */
    .modal-steps {
      display: flex; align-items: center;
      padding: 0 36px;
      background: var(--cream); border-bottom: 1px solid var(--cream-dk);
    }
    .step-item {
      flex: 1; padding: 16px 0; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      position: relative;
    }
    .step-item:not(:last-child)::after {
      content: ''; position: absolute;
      top: 50%; right: -50%;
      width: 100%; height: 1px;
      background: var(--cream-dk);
      z-index: 0;
    }
    [dir="ltr"] .step-item:not(:last-child)::after { right: auto; left: -50%; }
    .step-circle {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--cream-dk);
      background: white; color: var(--text-muted);
      font-size: 0.8rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      transition: all var(--dur) var(--ease);
    }
    .step-item.active .step-circle { border-color: var(--gold); background: var(--gold); color: var(--ink); }
    .step-item.done .step-circle { border-color: var(--gold); background: var(--gold); color: var(--ink); }
    .step-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }
    .step-item.active .step-label { color: var(--gold); }

    .modal-body { padding: 36px; }
    .form-step { display: none; }
    .form-step.active { display: block; }

    .form-group { margin-bottom: 22px; }
    .form-label {
      display: block; font-size: 0.88rem; font-weight: 600;
      color: var(--ink); margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 13px 18px;
      border: 1.5px solid var(--cream-dk);
      border-radius: var(--r-md);
      font-family: inherit; font-size: 0.92rem; color: var(--text);
      background: var(--cream); outline: none;
      transition: all var(--dur) var(--ease);
    }
    .form-input:focus { border-color: var(--gold); background: white; box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .time-slots {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 8px;
    }
    .time-slot {
      padding: 10px 6px; text-align: center; border-radius: var(--r-md);
      border: 1.5px solid var(--cream-dk);
      font-size: 0.82rem; font-weight: 600; color: var(--text-soft);
      cursor: pointer; transition: all var(--dur) var(--ease);
      background: white;
    }
    .time-slot:hover { border-color: var(--gold); color: var(--gold); }
    .time-slot.selected { background: var(--grad-gold); border-color: transparent; color: var(--ink); }
    .time-slot.unavailable { opacity: 0.35; cursor: not-allowed; }

    .modal-footer {
      padding: 24px 36px; border-top: 1px solid var(--cream-dk);
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Booking success */
    .booking-success {
      text-align: center; padding: 40px 36px;
    }
    .success-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border: 2px solid var(--gold);
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .success-icon svg { width: 40px; height: 40px; fill: var(--gold); }

    /* ══════════════════════════════════
       CHAT WIDGET
    ══════════════════════════════════ */
    .chat-widget {
      position: fixed; bottom: 28px; z-index: 1000;
      transition: all var(--dur) var(--ease);
    }
    [dir="rtl"] .chat-widget { right: 28px; }
    [dir="ltr"] .chat-widget { left: 28px; }

    .chat-fab {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--grad-gold);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--sh-gold);
      cursor: pointer; transition: all var(--dur) var(--ease);
      position: relative;
    }
    .chat-fab:hover { transform: scale(1.08); }
    .chat-fab svg { width: 26px; height: 26px; fill: var(--ink); }
    .chat-pulse {
      position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid var(--gold); opacity: 0.5;
      animation: chat-pulse-ring 2.5s infinite;
    }
    @keyframes chat-pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .chat-panel {
      position: absolute;
      bottom: 76px;
      width: 360px;
      background: white;
      border-radius: var(--r-xl);
      box-shadow: var(--sh-deep);
      overflow: hidden;
      border: 1px solid var(--cream-dk);
      opacity: 0; visibility: hidden;
      transform: translateY(16px) scale(0.96);
      transition: all var(--dur-slow) var(--ease);
    }
    [dir="rtl"] .chat-panel { right: 0; }
    [dir="ltr"] .chat-panel { left: 0; }
    .chat-panel.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

    .chat-head {
      background: var(--grad-ink); padding: 18px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-head-info { display: flex; align-items: center; gap: 12px; }
    .chat-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--grad-gold);
      display: flex; align-items: center; justify-content: center;
    }
    .chat-avatar svg { width: 20px; height: 20px; fill: var(--ink); }
    .chat-name { font-size: 0.95rem; font-weight: 700; color: white; }
    .chat-status { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: rgba(255,255,255,0.45); }
    .chat-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
    .chat-close-btn { color: rgba(255,255,255,0.4); transition: color var(--dur) var(--ease); }
    .chat-close-btn:hover { color: white; }
    .chat-close-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .chat-msgs {
      height: 280px; overflow-y: auto;
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .chat-msg {
      max-width: 82%; padding: 11px 14px;
      border-radius: var(--r-lg); font-size: 0.88rem; line-height: 1.55;
    }
    .chat-msg.bot {
      background: var(--cream); color: var(--text);
      border-radius: var(--r-lg) var(--r-lg) var(--r-lg) 4px;
      [dir="rtl"] &{ border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg); }
      align-self: flex-start;
    }
    .chat-msg.user {
      background: var(--grad-ink); color: white;
      border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg);
      [dir="rtl"] &{ border-radius: var(--r-lg) var(--r-lg) var(--r-lg) 4px; }
      align-self: flex-end;
    }
    .chat-suggestions {
      padding: 8px 14px 4px; display: flex; flex-wrap: wrap; gap: 6px;
      border-top: 1px solid var(--cream-dk);
    }
    .chat-sug {
      padding: 6px 12px; border-radius: var(--r-pill);
      border: 1px solid var(--cream-dk); background: var(--cream);
      font-size: 0.78rem; color: var(--text-soft); cursor: pointer;
      transition: all var(--dur) var(--ease);
    }
    .chat-sug:hover { border-color: var(--gold); color: var(--gold); }

    .chat-input-row {
      padding: 12px 14px;
      display: flex; gap: 8px; align-items: center;
      border-top: 1px solid var(--cream-dk);
    }
    .chat-input {
      flex: 1; padding: 10px 14px; border-radius: var(--r-pill);
      border: 1.5px solid var(--cream-dk);
      font-family: inherit; font-size: 0.88rem; outline: none;
      background: var(--cream); color: var(--text);
      transition: border-color var(--dur) var(--ease);
    }
    .chat-input:focus { border-color: var(--gold); background: white; }
    .chat-send {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--grad-gold); color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all var(--dur) var(--ease);
    }
    .chat-send:hover { box-shadow: var(--sh-gold); transform: scale(1.05); }
    .chat-send svg { width: 16px; height: 16px; fill: currentColor; }

    /* ══════════════════════════════════
       FLOATING ELEMENTS
    ══════════════════════════════════ */
    .whatsapp-btn {
      position: fixed; bottom: 28px; z-index: 999;
      width: 52px; height: 52px; border-radius: 50%;
      background: #25D366;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      transition: all var(--dur) var(--ease);
    }
    [dir="rtl"] .whatsapp-btn { left: 28px; }
    [dir="ltr"] .whatsapp-btn { right: 28px; }
    .whatsapp-btn:hover { transform: scale(1.1); }
    .whatsapp-btn svg { width: 26px; height: 26px; fill: white; }

    /* ══════════════════════════════════
       SCROLL ANIMATIONS
    ══════════════════════════════════ */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.7s var(--ease), transform 0.7s var(--ease);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ══════════════════════════════════
       ILLUSTRATED PLACEHOLDERS
    ══════════════════════════════════ */
    .illus-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ══════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════ */
    @media (max-width: 1100px) {
      .dept-grid { grid-template-columns: repeat(3, 1fr); }
      .doctors-grid { grid-template-columns: repeat(3, 1fr); }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
    }
    @media (max-width: 900px) {
      .about-grid { grid-template-columns: 1fr; gap: 48px; }
      .branches-grid { grid-template-columns: repeat(2, 1fr); }
      .hero-visual { display: none; }
      .hero-content { max-width: 100%; }
      .stats-bar-inner { grid-template-columns: repeat(2, 1fr); }
      .nav-links { display: none; }
    }
    @media (max-width: 640px) {
      .dept-grid, .doctors-grid, .branches-grid { grid-template-columns: 1fr 1fr; }
      .stats-bar-inner { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; }
      .about-features { grid-template-columns: 1fr; }
      .chat-panel { width: calc(100vw - 56px); }
    }

    /* ══════════════════════════════════

/* ═══ COUNTER HOOK ═══ */
function useCounter(target, duration = 2000, started = false) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!started) return;
    let startTime;
    const num = parseInt(String(target).replace(/\D/g,''));
    const suffix = String(target).replace(/[0-9]/g,'');
    const step = (ts) => {
      if (!startTime) startTime = ts;
      const prog = Math.min((ts - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - prog, 3);
      setVal(Math.floor(num * eased) + suffix);
      if (prog < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [started]);
  return val || 0;
}

/* ═══ INTERSECTION OBSERVER HOOK ═══ */
function useInView(ref, threshold = 0.1) {
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return inView;
}

/* BOOKING MODAL */
function BookingModal({ lang, open, onClose }) {
  const t = T[lang].booking;
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ dept:'', branch:'', doctor:'', date:'', time:'', name:'', phone:'', email:'', notes:'', nationalId:'', payer:'' });
  const [confirmed, setConfirmed] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [errorMsg, setErrorMsg] = useState('');
  const [waSid, setWaSid] = useState('');
  const [bookingResult, setBookingResult] = useState(null);

  const times = ['08:00','09:00','10:00','11:00','13:00','14:00','15:00','16:00'];
  const depts = DEPARTMENTS.map(d=>lang==='ar'?d.nameAr:d.nameEn);
  const branches = BRANCHES.map(b=>lang==='ar'?b.nameAr:b.nameEn);
  const payers = ['Bupa','Tawuniya','MedGulf','Al Rajhi Takaful','GlobeMed','Walaa','Cash / نقدي'];

  useEffect(() => {
    if (!open) { setStep(1); setConfirmed(false); setSubmitting(false); setErrorMsg(''); setWaSid(''); setBookingResult(null); setForm({dept:'',branch:'',doctor:'',date:'',time:'',name:'',phone:'',email:'',notes:'',nationalId:'',payer:''}); }
  }, [open]);

  const API = 'https://hnh.brainsait.org';

  async function handleConfirm() {
    setSubmitting(true); setErrorMsg('');
    const result = { eligibility:null, patientId:null, appointmentId:null, waSid:null, copay:null };
    const withTimeout = (ms) => { const c = new AbortController(); setTimeout(()=>c.abort(), ms); return c.signal; };
    try {
      const phone = (form.phone || '').trim();
      const phoneE164 = phone.startsWith('+') ? phone : (phone.startsWith('00') ? '+' + phone.slice(2) : (phone.startsWith('05') ? '+966' + phone.slice(1) : (phone.startsWith('5') && phone.length === 9 ? '+966' + phone : '+' + phone)));

      // 1) Eligibility (best-effort) — non-blocking, 5s timeout
      if (form.nationalId && form.payer && !/cash|نقدي/i.test(form.payer)) {
        try {
          const er = await fetch(`${API}/api/eligibility/check`, {
            method:'POST', headers:{'content-type':'application/json'},
            body: JSON.stringify({ insurance_id: form.payer, national_id: form.nationalId, service_type:'medical' }),
            signal: withTimeout(5000),
          });
          const ej = await er.json().catch(()=>({}));
          if (ej && ej.success !== false) {
            const e = ej.eligibility || ej;
            result.eligibility = e.status || e.eligible || 'verified';
            result.copay = e.copay_amount ?? e.copay ?? null;
          }
        } catch {}
      }

      // 2) Find or create patient (HIS_DB)
      let patientId = null;
      try {
        const pr = await fetch(`${API}/api/patients?search=${encodeURIComponent(phoneE164)}`, { signal: withTimeout(8000) });
        const pj = await pr.json().catch(()=>({}));
        const found = (pj.patients || pj.data || [])[0];
        patientId = found?.id || found?.patient_id || null;
      } catch {}
      if (!patientId) {
        const cr = await fetch(`${API}/api/patients`, {
          method:'POST', headers:{'content-type':'application/json'},
          body: JSON.stringify({
            full_name_ar: form.name, full_name_en: form.name,
            phone: phoneE164, email: form.email || null,
            national_id: form.nationalId || null, payer_name: form.payer || null,
          }),
          signal: withTimeout(10000),
        });
        const cj = await cr.json().catch(()=>({}));
        patientId = cj.patient_id || cj.id || cj.patient?.id || null;
      }
      result.patientId = patientId;

      // 3) Persist appointment under provider OID tree
      if (patientId) {
        try {
          const ar = await fetch(`${API}/api/appointments`, {
            method:'POST', headers:{'content-type':'application/json'},
            body: JSON.stringify({
              patient_id: patientId,
              clinic_name: form.branch || form.dept,
              speciality: form.dept,
              provider_name: form.doctor || null,
              appointment_date: form.date,
              appointment_time: form.time || '10:00',
              reason: form.notes || form.dept,
              appointment_type: 'outpatient',
              status: 'scheduled',
              source: 'hnh-landing',
            }),
            signal: withTimeout(10000),
          });
          const aj = await ar.json().catch(()=>({}));
          result.appointmentId = aj.appointment_id || aj.id || aj.appointment?.id || null;
        } catch {}
      }

      // 4) WhatsApp confirmation — best-effort, do NOT throw
      try {
        const wr = await fetch(`${API}/api/whatsapp/appointment`, {
          method:'POST', headers:{'content-type':'application/json'},
          body: JSON.stringify({
            to: phoneE164, patientName: form.name,
            date: form.date, time: form.time, clinic: form.branch, lang,
          }),
          signal: withTimeout(10000),
        });
        const wj = await wr.json().catch(()=>({}));
        result.waSid = wj?.sid || wj?.message?.sid || '';
        result.waOk = wr.ok && wj?.success !== false;
      } catch { result.waOk = false; }
      result.phone = phoneE164;

      // 5) Email confirmation (fire-and-forget)
      if (form.email) {
        result.icsUrl = `${API}/api/appointments/${encodeURIComponent(result.appointmentId || 'tmp')}/ics?lang=${lang}&date=${encodeURIComponent(form.date)}&time=${encodeURIComponent(form.time||'10:00')}&clinic=${encodeURIComponent(form.branch||'')}&doctor=${encodeURIComponent(form.doctor||'')}&name=${encodeURIComponent(form.name||'')}`;
        fetch(`${API}/api/booking/email`, {
          method:'POST', headers:{'content-type':'application/json'},
          body: JSON.stringify({
            email: form.email, patientName: form.name,
            doctor: form.doctor, clinic: form.branch,
            date: form.date, time: form.time,
            appointmentId: result.appointmentId, lang,
          }),
        }).then(r=>r.json()).then(j=>{
          setBookingResult(prev => prev ? {...prev, emailSent: !!j?.success, emailChannel: j?.channel} : prev);
        }).catch(()=>{});
        result.emailPending = true;
      }

      // 6) Stash for context-aware Basma chat
      try {
        localStorage.setItem('hnh_patient', JSON.stringify({
          patientId, phone: phoneE164, name: form.name, lang,
          appointmentId: result.appointmentId, ts: Date.now(),
        }));
      } catch {}

      setWaSid(result.waSid);
      setBookingResult(result);
      setConfirmed(true);
    } catch (e) {
      setErrorMsg(String(e.message || e));
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <div className={`modal-overlay${open?' open':''}`} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>{t.title}</h3>
          <p>{t.sub}</p>
          <button className="modal-close" onClick={onClose}>
            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" fill="none"/></svg>
          </button>
        </div>

        {!confirmed && (
          <div className="modal-steps">
            {t.steps.map((s,i)=>(
              <div key={i} className={`step-item${step===i+1?' active':step>i+1?' done':''}`}>
                <div className="step-circle">
                  {step > i+1 ? <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> : i+1}
                </div>
                <div className="step-label">{s}</div>
              </div>
            ))}
          </div>
        )}

        <div className="modal-body">
          {confirmed ? (
            <div className="booking-success">
              <div className="success-icon">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
              </div>
              <h3 style={{color:'var(--ink)',marginBottom:8}}>{t.step4.title}</h3>
              <p style={{color:'var(--text-soft)',marginBottom:8}}>{t.step4.sub}</p>
              <p style={{color:'var(--text-soft)',marginBottom:16,fontSize:'0.85rem'}}>
                {lang==='ar'?'تم إرسال تأكيد على واتساب 📱':'A WhatsApp confirmation has been sent 📱'}
                {waSid && <span style={{display:'block',marginTop:4,fontFamily:'monospace',fontSize:'0.7rem',opacity:0.7}}>SID: {waSid}</span>}
              </p>
              {bookingResult && (
                <div style={{background:'var(--cream)',borderRadius:'var(--r-md)',padding:'14px 18px',marginBottom:16,fontSize:'0.85rem',color:'var(--text-soft)',textAlign:lang==='ar'?'right':'left'}}>
                  {bookingResult.eligibility && (
                    <div>✅ {lang==='ar'?'الأهلية:':'NPHIES Eligibility:'} <strong style={{color:'var(--ink)'}}>{bookingResult.eligibility}</strong>{bookingResult.copay!=null && <span> · {lang==='ar'?'المشاركة:':'Copay:'} <strong style={{color:'var(--ink)'}}>{bookingResult.copay} SAR</strong></span>}</div>
                  )}
                  {bookingResult.patientId && <div>👤 {lang==='ar'?'رقم المريض:':'Patient ID:'} <strong style={{color:'var(--ink)',fontFamily:'monospace'}}>{bookingResult.patientId}</strong></div>}
                  {bookingResult.appointmentId && <div>📅 {lang==='ar'?'رقم الموعد:':'Appointment:'} <strong style={{color:'var(--ink)',fontFamily:'monospace'}}>{bookingResult.appointmentId}</strong></div>}
                  {form.email && <div>✉️ {lang==='ar'?'البريد:':'Email:'} <strong style={{color:'var(--ink)'}}>{bookingResult.emailSent ? (lang==='ar'?'تم الإرسال ✓':'Sent ✓') : (lang==='ar'?'جارٍ الإرسال...':'Sending...')}</strong></div>}
                  <div style={{marginTop:8,fontSize:'0.78rem',opacity:0.7}}>{lang==='ar'?'سيظهر موعدك مباشرة في لوحة الطبيب · GIVC':'Your appointment is now live on the provider dashboard · GIVC'}</div>
                </div>
              )}
              <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap',marginBottom:16}}>
                {bookingResult?.icsUrl && (
                  <a href={bookingResult.icsUrl} download className="btn btn-outline-gold" style={{textDecoration:'none',fontSize:'0.82rem',padding:'8px 14px'}}>
                    📅 {lang==='ar'?'إضافة إلى التقويم':'Add to calendar'}
                  </a>
                )}
                <button
                  className="btn btn-outline-gold"
                  style={{fontSize:'0.82rem',padding:'8px 14px'}}
                  onClick={async()=>{
                    try {
                      const phoneE164 = bookingResult?.phone || form.phone;
                      const r = await fetch(`${API}/api/whatsapp/appointment`, {
                        method:'POST', headers:{'content-type':'application/json'},
                        body: JSON.stringify({ to: phoneE164, patientName: form.name, date: form.date, time: form.time, clinic: form.branch, lang }),
                      });
                      const j = await r.json().catch(()=>({}));
                      if (j?.sid) setWaSid(j.sid);
                    } catch {}
                  }}
                >🔁 {lang==='ar'?'لم تصل؟ إعادة إرسال':"Didn't get it? Resend"}</button>
              </div>
              <div style={{display:'flex',gap:12,justifyContent:'center'}}>
                <button className="btn btn-outline-gold" onClick={()=>{setConfirmed(false);setStep(1);}}>{t.step4.newBook}</button>
                <button className="btn btn-gold" onClick={onClose}>{t.step4.close}</button>
              </div>
            </div>
          ) : (
            <>
              {step === 1 && (
                <div className="form-step active">
                  <div className="form-group">
                    <label className="form-label">{t.step1.deptLabel}</label>
                    <select className="form-input" value={form.dept} onChange={e=>setForm({...form,dept:e.target.value})}>
                      <option value="">{t.step1.selectDept}</option>
                      {depts.map(d=><option key={d} value={d}>{d}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{t.step1.branchLabel}</label>
                    <select className="form-input" value={form.branch} onChange={e=>setForm({...form,branch:e.target.value})}>
                      <option value="">{t.step1.selectBranch}</option>
                      {branches.map(b=><option key={b} value={b}>{b}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{t.step1.doctorLabel}</label>
                    <select className="form-input" value={form.doctor} onChange={e=>setForm({...form,doctor:e.target.value})}>
                      <option value="">{t.step1.selectDoctor}</option>
                      {DOCTORS.filter(d=> !form.dept || (lang==='ar'?d.specAr:d.specEn)===form.dept).map((d,i)=>(
                        <option key={i} value={lang==='ar'?d.ar:d.en}>{lang==='ar'?d.ar:d.en}</option>
                      ))}
                    </select>
                  </div>
                </div>
              )}
              {step === 2 && (
                <div className="form-step active">
                  <div className="form-group">
                    <label className="form-label">{t.step2.dateLabel}</label>
                    <input type="date" className="form-input" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} min={new Date().toISOString().split('T')[0]} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">{t.step2.timeLabel}</label>
                    <div className="time-slots">
                      {times.map(time=>(
                        <div key={time} className={`time-slot${form.time===time?' selected':''}${time==='11:00'?' unavailable':''}`}
                          onClick={()=>time!=='11:00'&&setForm({...form,time})}>
                          {time}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
              {step === 3 && (
                <div className="form-step active">
                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">{t.step3.nameLabel}</label>
                      <input type="text" className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">{t.step3.phoneLabel}</label>
                      <input type="tel" className="form-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} />
                    </div>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{t.step3.emailLabel}</label>
                    <input type="email" className="form-input" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">{t.step3.notesLabel}</label>
                    <textarea className="form-input" rows="3" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={{resize:'vertical'}}/>
                  </div>
                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">{t.step3.nationalLabel}</label>
                      <input type="text" inputMode="numeric" maxLength="10" className="form-input" value={form.nationalId} onChange={e=>setForm({...form,nationalId:e.target.value.replace(/\D/g,'')})} placeholder={lang==='ar'?'1xxxxxxxxx':'1xxxxxxxxx'} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">{t.step3.payerLabel}</label>
                      <select className="form-input" value={form.payer} onChange={e=>setForm({...form,payer:e.target.value})}>
                        <option value="">{lang==='ar'?'— اختر —':'— select —'}</option>
                        {payers.map(p=> <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                  </div>
                  {form.dept && (
                    <div style={{background:'var(--cream)',borderRadius:'var(--r-md)',padding:'16px',fontSize:'0.88rem',color:'var(--text-soft)'}}>
                      <div style={{fontWeight:600,color:'var(--ink)',marginBottom:6}}>{lang==='ar'?'ملخص الحجز:':'Booking Summary:'}</div>
                      <div>{lang==='ar'?'القسم:':'Dept:'} <strong>{form.dept}</strong></div>
                      {form.branch && <div>{lang==='ar'?'الفرع:':'Branch:'} <strong>{form.branch}</strong></div>}
                      {form.doctor && <div>{lang==='ar'?'الطبيب:':'Doctor:'} <strong>{form.doctor}</strong></div>}
                      {form.date && <div>{lang==='ar'?'التاريخ:':'Date:'} <strong>{form.date}</strong></div>}
                      {form.time && <div>{lang==='ar'?'الوقت:':'Time:'} <strong>{form.time}</strong></div>}
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </div>

        {!confirmed && (
          <div className="modal-footer">
            {step > 1 ? (
              <button className="btn btn-ghost" style={{color:'var(--text-soft)',border:'1px solid var(--cream-dk)'}} onClick={()=>setStep(s=>s-1)}>{t.prev}</button>
            ) : <span />}
            {step < 3 ? (
              <button className="btn btn-gold" onClick={()=>setStep(s=>s+1)}>{t.next}</button>
            ) : (
              <button className="btn btn-gold" onClick={handleConfirm} disabled={submitting || !form.name || !form.phone || !form.date || !form.time}>
                {submitting ? (lang==='ar'?'…جاري التأكيد':'Confirming…') : t.confirm}
              </button>
            )}
          </div>
        )}
        {errorMsg && (
          <div style={{padding:'12px 24px',color:'#a33',fontSize:'0.85rem',textAlign:'center',borderTop:'1px solid var(--cream-dk)'}}>
            {lang==='ar'?'تعذر إرسال التأكيد:':'Confirmation failed:'} {errorMsg}
          </div>
        )}
      </div>
    </div>
  );
}

/* CHAT WIDGET */
function ChatWidget({ lang }) {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const msgsRef = useRef(null);
  const t = T[lang].chat;

  useEffect(() => {
    setMsgs([{role:'bot',text:t.welcome}]);
  }, [lang]);

  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [msgs]);

  function send(text) {
    if (!text.trim()) return;
    const userMsg = {role:'user',text};
    setMsgs(m=>[...m, userMsg]);
    setInput('');
    setMsgs(m=>[...m, {role:'bot',text:'…',pending:true}]);
    let stash = null;
    try { stash = JSON.parse(localStorage.getItem('hnh_patient') || 'null'); } catch {}
    fetch('https://hnh.brainsait.org/api/basma/chat', {
      method: 'POST',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ message: text, lang, phone: stash?.phone || undefined, name: stash?.name || undefined }),
    })
      .then(r => r.json())
      .then(data => {
        const reply = (data && data.reply) ? data.reply : getChatResponse(text, lang);
        setMsgs(m => {
          const next = [...m];
          const i = next.map(x=>x.pending).lastIndexOf(true);
          if (i >= 0) next[i] = {role:'bot', text: reply};
          else next.push({role:'bot', text: reply});
          return next;
        });
      })
      .catch(() => {
        setMsgs(m => {
          const next = [...m];
          const i = next.map(x=>x.pending).lastIndexOf(true);
          const fallback = getChatResponse(text, lang);
          if (i >= 0) next[i] = {role:'bot', text: fallback};
          else next.push({role:'bot', text: fallback});
          return next;
        });
      });
  }

  return (
    <div className="chat-widget">
      <div className={`chat-panel${open?' open':''}`}>
        <div className="chat-head">
          <div className="chat-head-info">
            <div className="chat-avatar">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style={{fill:'var(--ink)'}}>
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
              </svg>
            </div>
            <div>
              <div className="chat-name">{t.name}</div>
              <div className="chat-status"><span className="chat-status-dot"></span>{t.online}</div>
            </div>
          </div>
          <button className="chat-close-btn" onClick={()=>setOpen(false)}>
            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" fill="none"/></svg>
          </button>
        </div>
        <div className="chat-msgs" ref={msgsRef}>
          {msgs.map((m,i)=>(
            <div key={i} className={`chat-msg ${m.role}`}>{m.text}</div>
          ))}
        </div>
        <div className="chat-suggestions">
          {t.sugs.map((s,i)=>(
            <button key={i} className="chat-sug" onClick={()=>send(s)}>{s}</button>
          ))}
        </div>
        <div className="chat-input-row">
          <input
            className="chat-input" type="text"
            placeholder={t.placeholder} value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&send(input)}
          />
          <button className="chat-send" onClick={()=>send(input)}>
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <div className="chat-fab" onClick={()=>setOpen(o=>!o)}>
        <div className="chat-pulse"></div>
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style={{fill:'var(--ink)'}}>
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
          <circle cx="8" cy="10" r="1"/><circle cx="12" cy="10" r="1"/><circle cx="16" cy="10" r="1"/>
        </svg>
      </div>
    </div>
  );
}
