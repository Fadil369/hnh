name = "hnh-gharnata-api"
main = "worker.js"
compatibility_date = "2025-04-01"
# account_id = "your-cloudflare-account-id"  # Set via CLOUDFLARE_ACCOUNT_ID env var or wrangler login

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "hnh-gharnata"
database_id = "d6960732-d5d0-4271-84e9-ba988c9c32dc"

# Non-secret environment variables
[vars]
ORACLE_BRIDGE_URL = "https://oracle-bridge.brainsait.org"
NPHIES_MIRROR_URL = "https://nphies-mirror.brainsait-fadil.workers.dev"
FACILITY_LICENSE = "10000000000988"
HUB_VERSION = "3.0.0"

# Secrets — set these via wrangler CLI or CI, do NOT commit values here:
#   wrangler secret put ORACLE_API_KEY
#   wrangler secret put API_KEY
#   wrangler secret put NPHIES_TOKEN

# Custom domains (requires Cloudflare zone configuration)
# routes = [
#   { pattern = "api.elfadil.com/*", zone_name = "elfadil.com" },
#   { pattern = "bsma.elfadil.com/api/*", zone_name = "elfadil.com" },
#   { pattern = "givc.elfadil.com/api/*", zone_name = "elfadil.com" },
#   { pattern = "sbs.elfadil.com/api/*", zone_name = "elfadil.com" },
# ]

# Staging environment
[env.staging]
name = "hnh-unified-hub-staging"
vars = { NPHIES_ENVIRONMENT = "sandbox", HUB_VERSION = "3.0.0-staging" }

# Production environment
[env.production]
name = "hnh-unified-hub-production"
vars = { NPHIES_ENVIRONMENT = "production", HUB_VERSION = "3.0.0" }
