# HNH Unified Worker — wrangler.toml
# Replaces: hnh-portal + hnh-gharnata-api → hnh-unified (v4.0.0)

name = "hnh-gharnata-api"
main = "worker.js"
compatibility_date = "2026-05-01"
account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "hnh-gharnata"
database_id = "d6960732-d5d0-4271-84e9-ba988c9c32dc"

[vars]
ORACLE_BRIDGE_URL  = "https://oracle-bridge.brainsait.org"
NPHIES_MIRROR_URL  = "https://nphies-mirror.brainsait-fadil.workers.dev"
FACILITY_LICENSE   = "10000000000988"
HOSPITAL_NAME      = "Hayat National Hospital - Gharnata"
HUB_VERSION        = "4.0.0"

# Secrets (set via wrangler secret put, never commit values):
#   wrangler secret put ORACLE_API_KEY
#   wrangler secret put API_KEY
#   wrangler secret put NPHIES_TOKEN
#   wrangler secret put ELEVENLABS_API_KEY

# Custom domain (add after DNS points to this worker):
# [[routes]]
# pattern = "hnh.brainsait.org/*"
# zone_name = "brainsait.org"

[env.staging]
name = "hnh-unified-staging"
vars = { HUB_VERSION = "4.0.0-staging" }

[env.production]
name = "hnh-unified"
vars = { HUB_VERSION = "4.0.0" }
