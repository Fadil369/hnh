<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة غير موجودة | مستشفيات الحياة الوطني</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--gradient-primary);
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .error-content {
      position: relative;
      z-index: 1;
      padding: 40px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }
    .error-title {
      color: var(--white);
      font-size: 2rem;
      margin-bottom: 16px;
    }
    .error-desc {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      margin-bottom: 32px;
      max-width: 500px;
    }
    .error-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">الصفحة غير موجودة</h1>
      <p class="error-desc">عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها. يرجى التحقق من الرابط أو العودة إلى الصفحة الرئيسية.</p>
      <div class="error-buttons">
        <a href="index.html" class="btn btn-accent btn-lg">العودة للرئيسية</a>
        <a href="contact.html" class="btn btn-white btn-lg">اتصل بنا</a>
      </div>
    </div>
  </div>
</body>
</html>
