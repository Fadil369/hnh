    let currentCat = 'all';

    function renderDepartments() {
      const grid = document.getElementById('allDeptsGrid');
      const search = document.getElementById('deptSearch').value.toLowerCase();
      const l = HNH.currentLang();
      const filtered = allDepartments.filter(d => {
        const matchCat = currentCat === 'all' || d.cat === currentCat;
        const name = l === 'ar' ? d.ar : d.en;
        const matchSearch = !search || name.toLowerCase().includes(search);
        return matchCat && matchSearch;
      });
      grid.innerHTML = filtered.map((d, i) => `
        <div class="card dept-card animate-on-scroll delay-${(i%6)+1}" data-cat="${d.cat}">
          <div class="dept-icon">${d.icon}</div>
          <h4>${l === 'ar' ? d.ar : d.en}</h4>
          <p style="font-size:0.85rem;color:var(--text-light);">${l === 'ar' ? d.en : d.ar}</p>
        </div>
      `).join('');
      // Re-observe new elements
      setTimeout(() => {
        document.querySelectorAll('.animate-on-scroll:not(.animated)').forEach(el => {
          new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('animated'); });
          }, {threshold:0.1}).observe(el);
        });
      }, 50);
    }

    function filterDeptCat(btn, cat) {
      currentCat = cat;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderDepartments();
    }

    function filterDepartments() { renderDepartments(); }

    renderDepartments();

    function updateDeptContent() {
      const l = HNH.currentLang();
      document.getElementById('deptPageSub').textContent = l === 'ar' ? 'نغطي أكثر من 30 تخصصًا طبيًا لخدمة صحتكم' : 'Covering 30+ medical specialties for your health';
      document.getElementById('deptSearch').placeholder = l === 'ar' ? 'ابحث عن قسم...' : 'Search departments...';
      renderDepartments();
    }
    const origToggle3 = HNH.toggleLanguage;
    HNH.toggleLanguage = function() { origToggle3(); setTimeout(updateDeptContent, 50); };
